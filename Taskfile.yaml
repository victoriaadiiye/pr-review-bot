version: "3"

vars:
  GO: /usr/local/go/bin/go
  BINARY: pr-review-bot
  TMUX_SESSION: bot
  ROOT_DIR:
    sh: pwd

tasks:
  build:
    desc: Build the binary
    cmds:
      - "{{.GO}} build -o {{.BINARY}} ."

  restart:
    desc: Kill running bot in tmux and restart it
    cmds:
      - tmux kill-session -t {{.TMUX_SESSION}} 2>/dev/null || true
      - tmux new-session -d -s {{.TMUX_SESSION}} -c {{.ROOT_DIR}} "./{{.BINARY}}"

  deploy:
    desc: Pull latest code, rebuild, and restart the bot
    cmds:
      - git pull
      - "{{.GO}} build -o {{.BINARY}} ."
      - tmux kill-session -t {{.TMUX_SESSION}} 2>/dev/null || true
      - tmux new-session -d -s {{.TMUX_SESSION}} -c {{.ROOT_DIR}} "./{{.BINARY}}"

  logs:
    desc: Tail the bot log
    cmds:
      - tail -f bot.log

  status:
    desc: Show tmux session status
    cmds:
      - tmux capture-pane -t {{.TMUX_SESSION}} -p | tail -20
